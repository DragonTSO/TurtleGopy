        2:
          - "&8[&b&lTIP&8] &7Góp ý được chấp nhận sẽ nhận &e&lKEY &7làm thưởng!"
        3:
          - "&8[&b&lTIP&8] &7Phát hiện lỗi? Dùng &e/baoloi &7để báo cho admin!"
        4:
          - "&8[&b&lTIP&8] &7Theo dõi trạng thái góp ý bằng &e/gopy&7!"
        5:
          - "&8[&b&lTIP&8] &7Cần hỗ trợ? Gõ &e/hotro &7để tạo phiếu hỗ trợ!"
