name: TurtleGopy
version: ${project.version}
main: com.turtle.turtlegopy.TurtleGopyPlugin
api-version: '1.21'
folia-supported: true
softdepend: [TurtleCore]
description: Hệ thống góp ý, báo lỗi và hỗ trợ cho server Minecraft

commands:
  gopy:
    description: Mở menu góp ý
    usage: /gopy [check|reload|<nội dung>]
  baoloi:
    description: Mở menu báo lỗi
    usage: /baoloi [check|<nội dung>]
  hotro:
    description: Mở menu hỗ trợ
    usage: /hotro [check|<nội dung>]

permissions:
  turtlegopy.admin:
    description: Quản lý góp ý, báo lỗi và hỗ trợ (check, reload)
    default: op
