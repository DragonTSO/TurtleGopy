# TurtleGopy Configuration
# Plugin version: 1.0.0

# ============================================
# Mending Repair - Sửa đồ bằng kinh nghiệm
# ============================================
# Shift + Chuột phải khi cầm đồ có Mending để sửa bằng XP
mending-repair:
  # Bật/tắt tính năng
  enabled: true
  # Số durability phục hồi mỗi 1 XP (mặc định Minecraft: 2)
  durability-per-xp: 2
  # Permission cần có (để trống = ai cũng dùng được)
  permission: ""

# ============================================
# Storage Settings
# ============================================
storage:
  # Type: YAML or DATABASE
  type: YAML

  # Database settings (chỉ khi type: DATABASE)
  database:
    # MYSQL hoặc SQLITE
    type: SQLITE
    host: localhost
    port: 3306
    name: turtlegopy
    username: root
    password: ""
    table-prefix: "turtlegopy_"

# ============================================
# Chat Input Settings
# ============================================
chat-input:
  # Thời gian chờ nhập góp ý / báo lỗi (giây)
  timeout: 60
  # Từ để hủy nhập
  cancel-word: "cancel"

# ============================================
# Reward Settings - Góp Ý
# ============================================
# Phần thưởng khi góp ý được chấp nhận
# Người chơi dùng /nhanthuong để chọn 1 trong 2 phần thưởng
# Placeholders: {player} = tên người chơi, {feedback_id} = ID góp ý
rewards:
  enabled: true
  option-a:
    name: "&e1 Key Amethyst"
    icon: AMETHYST_SHARD
    commands:
      - "crates give {player} amethyst 1"
  option-b:
    name: "&b5000 Xu"
    icon: GOLD_INGOT
    commands:
      - "eco give {player} 5000"

# ============================================
# Reward Settings - Báo Lỗi
# ============================================
# Phần thưởng khi báo lỗi được xác nhận đã sửa
# Người chơi dùng /nhanthuong để chọn 1 trong 2 phần thưởng
# Placeholders: {player} = tên người chơi, {report_id} = ID báo lỗi
bugreport-rewards:
  enabled: true
  option-a:
    name: "&e1 Key Amethyst"
    icon: AMETHYST_SHARD
    commands:
      - "crates give {player} amethyst 1"
  option-b:
    name: "&b5000 Xu"
    icon: GOLD_INGOT
    commands:
      - "eco give {player} 5000"

# ============================================
# Reward Settings - Hỗ Trợ
# ============================================
# Phần thưởng khi phiếu hỗ trợ được giải quyết
# Placeholders: {player} = tên người chơi, {ticket_id} = ID phiếu hỗ trợ
support-rewards:
  enabled: false
  commands:
    - "crates give {player} amethyst 1"

# ============================================
# Support Chat Settings
# ============================================
# Luồng chat riêng cho mỗi phiếu hỗ trợ
support-chat:
  # Từ để thoát chat (ngoài /hotro exit)
  exit-word: "exit"

# ============================================
# GUI Settings
# ============================================
gui:
  # GUI Góp Ý
  player:
    title: "&6&l✉ Góp Ý Của Bạn"
    rows: 6
    items-per-page: 28
  admin:
    title: "&c&l⚙ Quản Lý Góp Ý"
    rows: 6
    items-per-page: 28

  # GUI Báo Lỗi
  bugreport-player:
    title: "&c&l🐛 Báo Lỗi Của Bạn"
    rows: 6
    items-per-page: 28
  bugreport-admin:
    title: "&4&l🐛 Quản Lý Báo Lỗi"
    rows: 6
    items-per-page: 28

  # GUI Hỗ Trợ
  support-player:
    title: "&3&l🎫 Phiếu Hỗ Trợ Của Bạn"
    rows: 6
    items-per-page: 28
  support-admin:
    title: "&3&l🎫 Quản Lý Hỗ Trợ"
    rows: 6
    items-per-page: 28

# ============================================
# Discord Bot Settings
# ============================================
# Liên kết với TurtleGopyBot Discord Bot
# Mỗi góp ý / báo lỗi sẽ tạo 1 channel Discord riêng
# Admin có thể set trạng thái trực tiếp từ Discord
discord:
  enabled: true
  # Token Discord Bot (từ Discord Developer Portal)
  token: "YOUR_BOT_TOKEN"
  # Discord Guild (Server) ID
  guild-id: "1431941220846010411"
  # Category ID cho channels Góp Ý
  feedback-category-id: "1489906376737292359"
  # Category ID cho channels Báo Lỗi
  bugreport-category-id: "1489906405841571931"
  # Category ID cho channels Hỗ Trợ
  support-category-id: "1489906431284219946"

  # Tên cụm (cluster) cho channel Discord
  # Format channel: <loại>-<cụm>-<id>
  # Ví dụ: baoloi-sv1-a1b2c3d4, gopy-sv1-a1b2c3d4
  # Để trống = không có cụm (baoloi-a1b2c3d4)
  channel-cluster: "smp"

  # Bật/tắt riêng từng loại
  feedback:
    enabled: true
  bugreport:
    enabled: true
  support:
    enabled: true

  # Trạng thái hiển thị của bot trên Discord
  # Placeholders: {tickets} = tổng số phiếu đang mở
  bot-status: "Đang hỗ trợ {tickets} phiếu"

  # Channel ID để log các sự kiện (tạo phiếu, đổi trạng thái, etc.)
  # Để trống = không log
  log-channel-id: ""


# ============================================
# Notification Settings
# ============================================
notification:
  # Thông báo cho người chơi khi trạng thái thay đổi
  on-status-change: true
  # Thông báo cho admin khi có góp ý mới
  on-new-feedback: true
  # Thông báo cho admin khi có báo lỗi mới
  on-new-bugreport: true
  # Thông báo cho admin khi có phiếu hỗ trợ mới
  on-new-support: true

# ============================================
# Auto Broadcast Settings
# ============================================
# Tự động gửi thông báo lên chat theo thời gian
# Mỗi cụm (1, 2, 3...) sẽ được gửi CẢ CỤM cùng lúc
# Sau đó chuyển sang cụm tiếp theo
broadcast:
  enabled: true
  groups:
    # Nhóm thông báo chung
    thongbao-chung:
      enabled: true
      interval: 1
      random: false
      permission: ""
      # Mỗi số là 1 cụm - gửi cả cụm cùng lúc
      messages:
        1:
          - "&8&m─────────────────────────────────"
          - "&6&l✉ GÓP Ý &8- &fBạn có ý tưởng? Gõ &e/gopy &fđể gửi góp ý!"
          - "&8&m─────────────────────────────────"
        2:
          - "&8&m─────────────────────────────────"
          - "&c&l🐛 BÁO LỖI &8- &fPhát hiện lỗi? Gõ &e/baoloi &fđể báo ngay!"
          - "&8&m─────────────────────────────────"
        3:
          - "&8&m─────────────────────────────────"
          - "&3&l🎫 HỖ TRỢ &8- &fCần giúp đỡ? Gõ &e/hotro &fđể gửi yêu cầu!"
          - "&8&m─────────────────────────────────"
        4:
          - "&8&m─────────────────────────────────"
          - "&a&l📢 THÔNG BÁO &8- &fChào mừng bạn đến với server!"
